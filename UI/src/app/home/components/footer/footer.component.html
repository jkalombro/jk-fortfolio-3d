<footer class="footer">
  <div class="footer-container">
    <div class="footer-terms">
      <p>Terms &amp; Conditions</p>
    </div>
    <div class="socials">
      @for (social of socialImgs; track social.name) {
        <div class="icon social-icon">
          <img [src]="social.imgPath" [alt]="social.name + ' icon'" width="24" height="24" loading="lazy" />
        </div>
      }
    </div>
    <div class="footer-copy">
      <p>© {{ year }} Jk Alombro. All rights reserved.</p>
    </div>
  </div>
</footer>

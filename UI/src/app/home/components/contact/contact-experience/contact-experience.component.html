<ngt-canvas [camera]="{ position: [0, 3, 7], fov: 45 }" [shadows]="true">
  <ng-template canvasContent>
    <ngt-ambient-light [intensity]="0.5" color="#fff4e6" />
    <ngt-directional-light [position]="[10, 2, 3]" [intensity]="2.5" color="#ffd9b3" [castShadow]="true" />

    <app-orbit-controls-contact />

    <ngt-group [scale]="[1, 1, 1]">
      <ngt-mesh [receiveShadow]="true" [position]="[0, -1.5, 0]" [rotation]="floorRotation">
        <ngt-plane-geometry [args]="planeGeomArgs" />
        <ngt-mesh-standard-material color="#a46b2d" />
      </ngt-mesh>
    </ngt-group>

    @if (scene()) {
      <ngt-group [scale]="computerScale" [position]="computerPosition" [castShadow]="true">
        <ngt-primitive *args="[scene()!]" />
      </ngt-group>
    }
  </ng-template>
</ngt-canvas>

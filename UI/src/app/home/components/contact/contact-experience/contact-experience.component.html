<ngt-canvas [camera]="{ position: [0, 3, 7], fov: 45 }" [shadows]="true">
  <ng-template canvasContent>
    <app-contact-lights />

    <app-orbit-controls-contact [minPolarAngle]="minPolarAngle" [maxPolarAngle]="maxPolarAngle" />

    <ngt-group [scale]="[1, 1, 1]">
      <ngt-mesh [receiveShadow]="true" [position]="[0, -1.5, 0]" [rotation]="floorRotation">
        <ngt-plane-geometry [args]="planeGeomArgs" />
        <ngt-mesh-standard-material color="#a46b2d" />
      </ngt-mesh>
    </ngt-group>

    @if (scene()) {
      <ngt-group [scale]="computerScale" [position]="computerPosition">
        <ngt-primitive *args="[scene()!]" />
      </ngt-group>
    }
  </ng-template>
</ngt-canvas>

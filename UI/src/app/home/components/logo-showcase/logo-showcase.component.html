<div class="logo-showcase-wrapper">
  <div class="gradient-edge" aria-hidden="true"></div>
  <div class="gradient-edge" aria-hidden="true"></div>

  <div class="marquee" aria-label="Companies and tools I've worked with">
    <div class="marquee-box">
      @for (icon of logoIcons; track $index) {
        <div class="marquee-item flex-center">
          <img [src]="icon.imgPath" alt="Company logo" />
        </div>
      }
      @for (icon of logoIcons; track $index) {
        <div class="marquee-item flex-center" aria-hidden="true">
          <img [src]="icon.imgPath" alt="" />
        </div>
      }
    </div>
  </div>
</div>
